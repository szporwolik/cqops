name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (leave empty to use VERSION file)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Read version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(cat VERSION)" >> $GITHUB_OUTPUT
          fi

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.value }}
          LDFLAGS: -s -w -X github.com/szporwolik/cqops/internal/version.Version=${{ steps.version.outputs.value }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0

          echo "Building $VERSION for linux/amd64..."
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cqops-linux-amd64 ./cmd/cqops/

          echo "Building $VERSION for linux/arm64..."
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cqops-linux-arm64 ./cmd/cqops/

          echo "Building $VERSION for windows/amd64..."
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cqops-windows-amd64.exe ./cmd/cqops/

          echo "Building $VERSION for windows/arm64..."
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cqops-windows-arm64.exe ./cmd/cqops/

          echo "Building $VERSION for darwin/amd64..."
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/cqops-darwin-amd64 ./cmd/cqops/

          echo "Building $VERSION for darwin/arm64..."
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/cqops-darwin-arm64 ./cmd/cqops/

          echo "Binaries:"
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: dist/*
