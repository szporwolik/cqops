name: CQOps — Build and Publish

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Validate version consistency between tag, VERSION file, and input.
  # ──────────────────────────────────────────────────────────────────────────
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          V="$(cat VERSION)"
          # If triggered by tag push, cross-check.
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            TAG="${TAG#v}"
            if [ "$V" != "$TAG" ]; then
              echo "ERROR: tag 'v${TAG}' != VERSION file '${V}'" >&2
              exit 1
            fi
          fi
          echo "value=$V" >> $GITHUB_OUTPUT
          echo "Version: $V"

  # ──────────────────────────────────────────────────────────────────────────
  # Build all Go binaries + Linux packages (deb + rpm)
  # ──────────────────────────────────────────────────────────────────────────
  build-unix:
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.3

      - name: Set version and build date
        id: meta
        run: |
          echo "version=${{ needs.validate-version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build binaries
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_DATE: ${{ steps.meta.outputs.date }}
          COMMIT: ${{ steps.meta.outputs.commit }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X github.com/szporwolik/cqops/internal/version.Version=$VERSION -X github.com/szporwolik/cqops/internal/version.Commit=$COMMIT -X github.com/szporwolik/cqops/internal/version.BuildDate=$BUILD_DATE"
          mkdir -p dist build
          export CGO_ENABLED=0

          echo "Building $VERSION for linux/amd64..."
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/cqops-linux-amd64 ./cmd/cqops/

          echo "Building $VERSION for linux/arm64..."
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o build/cqops-linux-arm64 ./cmd/cqops/

          echo "Building $VERSION for linux/arm (ARMv7 Pi)..."
          GOOS=linux GOARCH=arm GOARM=7 go build -ldflags "$LDFLAGS" -o build/cqops-linux-armhf ./cmd/cqops/

          echo "Building $VERSION for windows/amd64..."
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/cqops-windows-amd64.exe ./cmd/cqops/

          echo "Building $VERSION for darwin/amd64..."
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/cqops-darwin-amd64 ./cmd/cqops/

          echo "Building $VERSION for darwin/arm64..."
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o build/cqops-darwin-arm64 ./cmd/cqops/

          echo "Binaries before UPX:"
          ls -lh build/

      - name: Compress with UPX
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl
          upx --best build/cqops-linux-amd64
          upx --best build/cqops-linux-arm64
          upx --best build/cqops-linux-armhf
          upx --best build/cqops-darwin-amd64
          upx --best build/cqops-darwin-arm64
          echo "Binaries after UPX:"
          ls -lh build/

      - name: Package archives
        run: |
          set -euo pipefail
          cp build/cqops-darwin-amd64  dist/cqops-darwin-amd64
          cp build/cqops-darwin-arm64  dist/cqops-darwin-arm64
          cp build/cqops-linux-armhf   dist/cqops-linux-armhf
          cp build/cqops-windows-amd64.exe  dist/cqops-windows-amd64.exe

          zip -j dist/cqops-windows-portable.zip build/cqops-windows-amd64.exe
          tar -czf dist/cqops-linux-amd64.tar.gz -C build cqops-linux-amd64
          tar -czf dist/cqops-linux-arm64.tar.gz -C build cqops-linux-arm64
          tar -czf dist/cqops-linux-armhf.tar.gz -C build cqops-linux-armhf

          echo "Archives package:"
          ls -lh dist/

      - name: Smoke test (amd64)
        run: |
          ./build/cqops-linux-amd64 version
          echo "Smoke test (amd64) passed"

      - name: Smoke test (arm64 via QEMU)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq qemu-user-static
          qemu-aarch64-static build/cqops-linux-arm64 version
          echo "Smoke test (arm64) passed"

      - name: Smoke test (armv7 via QEMU)
        run: |
          qemu-arm-static build/cqops-linux-armhf version
          echo "Smoke test (armhf) passed"

      - name: Package Debian (deb)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          for arch in amd64 arm64 armhf; do
            echo "Packaging deb / $arch ..."
            NFFILE="dist/nfpm-${arch}.yaml"
            sed -e "s/__VERSION__/${VERSION}/g" \
                -e "s/__ARCH__/${arch}/g" \
                nfpm.yaml > "$NFFILE"
            nfpm package -f "$NFFILE" -p deb -t dist/ --packager deb \
              --target "dist/cqops_${VERSION}_${arch}.deb"
          done
          # Versionless copy for "latest" direct download link.
          cp "dist/cqops_${VERSION}_amd64.deb" "dist/cqops_amd64.deb"
          rm -f dist/nfpm-*.yaml
          echo "DEB packages:"
          ls -lh dist/*.deb

      - name: Package RPM (amd64 + arm64)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          for goarch in amd64 arm64; do
            rpmarch="$goarch"
            [ "$goarch" = "amd64" ] && rpmarch="x86_64"
            [ "$goarch" = "arm64" ] && rpmarch="aarch64"
            echo "Packaging rpm / $goarch -> $rpmarch ..."
            NFFILE="dist/nfpm-rpm-${goarch}.yaml"
            sed -e "s/__VERSION__/${VERSION}/g" \
                -e "s/__ARCH__/${goarch}/g" \
                nfpm.yaml > "$NFFILE"
            nfpm package -f "$NFFILE" -p rpm -t dist/ --packager rpm \
              --target "dist/cqops-${VERSION}-1.${rpmarch}.rpm"
          done
          rm -f dist/nfpm-*.yaml
          echo "RPM packages:"
          ls -lh dist/*.rpm

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-unix
          path: dist/*

  # ──────────────────────────────────────────────────────────────────────────
  # Windows NSIS installer
  # ──────────────────────────────────────────────────────────────────────────
  build-installer:
    runs-on: windows-latest
    needs: build-unix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-unix
          path: dist/

      - name: Read version
        id: version
        shell: bash
        run: echo "value=${{ needs.validate-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: powershell
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          copy dist\cqops-windows-amd64.exe build\cqops-windows-amd64.exe

          $makensis = 'C:\Program Files (x86)\NSIS\makensis.exe'
          if (-not (Test-Path $makensis)) {
            $makensis = (Get-Command makensis -ErrorAction SilentlyContinue).Source
          }
          if (-not $makensis) { throw "makensis not found after install" }
          $rootPath = (Resolve-Path '.').Path
          & $makensis /DVERSION=$env:VERSION /DROOT=$rootPath installer\cqops.nsi
          if ($LASTEXITCODE -ne 0) { throw "NSIS compilation failed" }

          Get-ChildItem dist\cqops-setup.exe | ForEach-Object {
            Write-Host "Installer: $($_.FullName) ($([math]::Round($_.Length/1MB,1)) MB)"
          }

      - name: Smoke test
        shell: powershell
        run: |
          & .\build\cqops-windows-amd64.exe version
          if ($LASTEXITCODE -ne 0) { throw "Smoke test failed" }
          Write-Host "Smoke test passed"

      - uses: actions/upload-artifact@v4
        with:
          name: release-installer
          path: dist/cqops-setup.exe

  # ──────────────────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────────────────────────────────
  create-github-release:
    runs-on: ubuntu-latest
    needs: [build-unix, build-installer]
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List assets
        run: ls -lhR dist/

      - name: Read version
        id: meta
        run: |
          V="$(cat VERSION)"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Version: $V"

      - name: Build release notes from merged PRs
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES="release-notes.md"

          echo "## What's Changed" > "$NOTES"
          echo "" >> "$NOTES"

          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1 || echo "")
          if [ -n "$LAST_TAG" ]; then
            # Get PR numbers merged since last tag.
            PRS=$(git log "${LAST_TAG}..HEAD" --merges --pretty=format:"#%s" --reverse | grep -oP '#\d+' | sed 's/#//' | sort -u || echo "")
            for pr in $PRS; do
              echo "### PR #${pr}" >> "$NOTES"
              # Use gh to get PR title and body.
              gh pr view "$pr" --json title,body --jq '"**\(.title)**\n\n\(.body)"' >> "$NOTES" 2>/dev/null || echo "_PR details unavailable_" >> "$NOTES"
              echo "" >> "$NOTES"
            done
          else
            echo "_First release._" >> "$NOTES"
          fi

          echo "Release notes:"
          cat "$NOTES"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: v${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          files: dist/*

  # ──────────────────────────────────────────────────────────────────────────
  # Publish to Cloudsmith (deb + rpm)
  # ──────────────────────────────────────────────────────────────────────────
  publish-cloudsmith:
    runs-on: ubuntu-latest
    needs: create-github-release
    if: vars.CLOUDSMITH_NAMESPACE != '' && vars.CLOUDSMITH_REPOSITORY != ''
    permissions:
      contents: write  # needed for gh release delete
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Read version
        id: meta
        run: |
          V="$(cat VERSION)"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Version: $V"

      - name: Install Cloudsmith CLI
        run: |
          set -euo pipefail
          pip3 install --user cloudsmith-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Publish packages to Cloudsmith
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
          REPO: ${{ vars.CLOUDSMITH_REPOSITORY }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY || '' }}
        run: |
          set -euo pipefail

          if [ -z "$CLOUDSMITH_API_KEY" ]; then
            echo "ERROR: CLOUDSMITH_API_KEY secret not set" >&2
            exit 1
          fi

          BASE="dist"
          REPO_PATH="${NAMESPACE}/${REPO}"

          # Upload debs
          for f in "$BASE"/cqops_"${VERSION}"_*.deb; do
            [ -f "$f" ] || continue
            echo "Uploading $f ..."
            cloudsmith push deb "$REPO_PATH/any-distro/any-version" "$f" --no-republish
          done

          # Upload RPMs
          for f in "$BASE"/cqops-"${VERSION}"-1.*.rpm; do
            [ -f "$f" ] || continue
            echo "Uploading $f ..."
            cloudsmith push rpm "$REPO_PATH/any-distro/any-version" "$f" --no-republish
          done

          echo "Cloudsmith upload complete."

      - name: Prune old Cloudsmith packages (keep only current)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
          REPO: ${{ vars.CLOUDSMITH_REPOSITORY }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY || '' }}
        run: |
          set -euo pipefail
          echo "Pruning old Cloudsmith packages, keeping only $VERSION..."
          REPO_PATH="${NAMESPACE}/${REPO}"
          cloudsmith list pkgs "$REPO_PATH" -q cqops --output-format json 2>/dev/null | \
            python3 -c "import json,sys,os; d=json.load(sys.stdin); c=os.environ['VERSION']; [print(p['slug']) for p in d.get('data',[]) if not (p.get('version','') or '').startswith(c)]" | \
            while read slug; do
              [ -z "$slug" ] && continue
              echo "Deleting old package: $slug"
              cloudsmith delete "$REPO_PATH/$slug" --yes 2>/dev/null || echo "  failed"
            done
          echo "Cloudsmith prune done."

      - name: Write summary
        run: |
          NAMESPACE="${{ vars.CLOUDSMITH_NAMESPACE }}"
          REPO="${{ vars.CLOUDSMITH_REPOSITORY }}"
          echo "### Cloudsmith" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: https://cloudsmith.io/~${NAMESPACE}/repos/${REPO}/packages/" >> $GITHUB_STEP_SUMMARY
          echo "- Setup APT: \`curl -1sLf 'https://dl.cloudsmith.io/public/${NAMESPACE}/${REPO}/setup.deb.sh' | sudo -E bash\`" >> $GITHUB_STEP_SUMMARY
          echo "- Setup RPM: \`curl -1sLf 'https://dl.cloudsmith.io/public/${NAMESPACE}/${REPO}/setup.rpm.sh' | sudo -E bash\`" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # Publish AUR package (cqops-bin) — disabled until AUR setup complete
  # ──────────────────────────────────────────────────────────────────────────
  publish-aur:
    runs-on: ubuntu-latest
    needs: create-github-release
    if: false
    steps:
      - name: Read version
        id: meta
        run: echo "version=${{ needs.create-github-release.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Generate and push PKGBUILD
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          V="$VERSION"
          URL="https://github.com/szporwolik/cqops/releases/download/v${V}/cqops_${V}_amd64.deb"
          curl -sSLo /tmp/cqops.deb "$URL"
          SHA256=$(sha256sum /tmp/cqops.deb | awk '{print $1}')
          rm /tmp/cqops.deb
          mkdir -p aur-dist
          cat > aur-dist/PKGBUILD << 'EOF'
          # Maintainer: Szymon Porwolik <szporwolik@users.noreply.github.com>
          pkgname=cqops-bin
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="A small, fast, offline-first amateur radio logger for the terminal"
          arch=('x86_64')
          url="https://github.com/szporwolik/cqops"
          license=('Apache-2.0')
          provides=('cqops')
          conflicts=('cqops')
          source=("cqops-__VERSION__.deb::https://github.com/szporwolik/cqops/releases/download/v__VERSION__/cqops___VERSION___amd64.deb")
          sha256sums=('__SHA256__')
          install=cqops-bin.install
          package() { bsdtar -xf "cqops-__VERSION__.deb"; tar -xf data.tar.xz -C "${pkgdir}"; }
          EOF
          sed -i "s/__VERSION__/${V}/g; s/__SHA256__/${SHA256}/g" aur-dist/PKGBUILD
          cat > aur-dist/cqops-bin.install << 'EOF'
          post_install() { echo "CQOps installed. Run 'cqops' to start."; }
          EOF
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan aur.archlinux.org > ~/.ssh/aur_known_hosts 2>/dev/null
          cat > ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/aur_known_hosts
          EOF
          cd aur-dist
          git clone ssh://aur@aur.archlinux.org/cqops-bin.git aur-repo 2>/dev/null || true
          if [ -d aur-repo/.git ]; then
            cp PKGBUILD cqops-bin.install aur-repo/
            cd aur-repo
            git add PKGBUILD cqops-bin.install
            if git diff --cached --quiet; then echo "AUR: no changes."; exit 0; fi
            git commit -m "Update to ${V}"
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # WinGet update — disabled until manifest is accepted.
  # ──────────────────────────────────────────────────────────────────────────
  publish-winget:
    runs-on: windows-latest
    needs: create-github-release
    if: false
    steps:
      - name: Check token
        id: gate
        shell: bash
        env:
          TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "WINGET_GITHUB_TOKEN not set — skipping WinGet submission."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Read version
        if: steps.gate.outputs.skip != 'true'
        id: meta
        shell: bash
        run: echo "version=${{ needs.create-github-release.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Submit WinGet update
        if: steps.gate.outputs.skip != 'true'
        shell: powershell
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          WINGET_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          dotnet tool install --global Microsoft.WingetCreateCLI --version 1.12.8.0
          wingetcreate update SzymonPorwolik.CQOps `
            --version $env:VERSION `
            --urls "https://github.com/szporwolik/cqops/releases/download/v$env:VERSION/cqops-setup.exe" `
            --token $env:WINGET_TOKEN `
            --submit

  # ──────────────────────────────────────────────────────────────────────────
  # Final cleanup: keep only 3 most recent GitHub releases
  # ──────────────────────────────────────────────────────────────────────────
  prune-releases:
    runs-on: ubuntu-latest
    needs: [create-github-release, publish-cloudsmith]
    if: always() && needs.create-github-release.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Prune old GitHub releases (keep latest 3)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Pruning old releases, keeping latest 3..."
          gh release list --limit 20 --json tagName,isLatest,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' | while read tag; do
            [ -z "$tag" ] && continue
            if gh release view "$tag" &>/dev/null; then
              echo "Deleting old release: $tag"
              gh release delete "$tag" --yes --cleanup-tag || echo "  failed"
            else
              echo "Skipping $tag (already gone)"
            fi
          done
          echo "Prune done."
