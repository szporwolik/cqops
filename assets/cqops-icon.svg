<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Radio wave arcs - left side -->
  <path d="M 48 108 A 56 56 0 0 1 48 148" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <path d="M 36 92  A 72 72 0 0 1 36 164" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M 24 76  A 88 88 0 0 1 24 180" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

  <!-- Radio wave arcs - right side -->
  <path d="M 208 108 A 56 56 0 0 0 208 148" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <path d="M 220 92  A 72 72 0 0 0 220 164" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M 232 76  A 88 88 0 0 0 232 180" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

  <!-- Antenna tower -->
  <rect x="123" y="48" width="10" height="160" rx="3" fill="#e94560"/>
  <!-- Tower cross-braces -->
  <line x1="108" y1="80" x2="148" y2="80" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <line x1="112" y1="110" x2="144" y2="110" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <line x1="116" y1="140" x2="140" y2="140" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <line x1="119" y1="170" x2="137" y2="170" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>

  <!-- Top antenna tip / spark -->
  <circle cx="128" cy="42" r="10" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="128" cy="42" r="5" fill="#fff" opacity="0.6"/>

  <!-- Base -->
  <rect x="100" y="200" width="56" height="8" rx="4" fill="#0f3460"/>
</svg>
