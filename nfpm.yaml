# =============================================================================
# nfpm config template — variables substituted by build script.
# ${VERSION} and ${ARCH} are replaced at build time.
# =============================================================================

name: "cqops"
arch: "__ARCH__"
platform: "linux"
version: "__VERSION__"
version_schema: semver
section: "hamradio"
priority: "optional"
maintainer: "Szymon Porwolik <szporwolik@users.noreply.github.com>"
description: |
  A small, fast, offline-first amateur radio logger for the terminal —
  built for portable/field ops, SOTA/POTA activations, and club stations
  with rotating operators. Hot-swap operators and logbooks, log via
  WSJT-X auto-feed or keyboard, sync to Wavelog. GPS-aware with APRS
  beaconing and a built-in browser dashboard. Runs on Raspberry Pi,
  old laptops, or any low-power machine over SSH or a local terminal.
vendor: "Szymon Porwolik"
homepage: "https://github.com/szporwolik/cqops"
license: "Apache-2.0"

# Binary is statically linked (CGO_ENABLED=0) — no runtime library deps.
depends: []

contents:
  - src: build/cqops-linux-__ARCH__
    dst: /usr/bin/cqops
    file_info:
      mode: 0755

  - src: assets/cqops-icon.svg
    dst: /usr/share/icons/hicolor/scalable/apps/cqops.svg

  - src: installer/cqops.desktop
    dst: /usr/share/applications/cqops.desktop

  - src: README.md
    dst: /usr/share/doc/cqops/README.md

  - src: CHANGELOG.md
    dst: /usr/share/doc/cqops/CHANGELOG.md
    type: ghost

  - src: LICENSE
    dst: /usr/share/doc/cqops/LICENSE
    type: ghost

overrides:
  deb:
    # Static binary — no runtime dependencies needed.
    depends: []
  rpm:
    provides:
      - cqops

# -----------------------------------------------------------------------------
# For multi-arch builds, run nfpm once per arch+format combination:
#   nfpm package -f nfpm.yaml -p deb -t dist/ -r amd64
#   nfpm package -f nfpm.yaml -p deb -t dist/ -r arm64
#   nfpm package -f nfpm.yaml -p deb -t dist/ -r armhf
#   nfpm package -f nfpm.yaml -p rpm -t dist/ -r amd64
#   nfpm package -f nfpm.yaml -p rpm -t dist/ -r arm64
# -----------------------------------------------------------------------------
#   nfpm package -f nfpm.yaml -p rpm -t dist/ -r arm64
# -----------------------------------------------------------------------------
